<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FlowTrade • NIFTY Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    /* ── Design tokens ── */
    :root {
      --bg: #F7F8FA;
      --surface: #FFFFFF;
      --border: #EAECF0;
      --border-soft: #F2F4F7;
      --text-primary: #101828;
      --text-secondary: #475467;
      --text-muted: #98A2B3;
      --green: #12B76A;
      --green-bg: #ECFDF3;
      --green-text: #027A48;
      --red: #F04438;
      --red-bg: #FEF3F2;
      --red-text: #B42318;
      --blue: #3E6BF4;
      --blue-bg: #EEF4FF;
      --blue-text: #3538CD;
      --navy: #101828;
      --pill-bg: #F2F4F7;
      --pill-text: #667085;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-xs: 0 1px 2px rgba(16,24,40,.05);
      --shadow-sm: 0 1px 3px rgba(16,24,40,.1), 0 1px 2px rgba(16,24,40,.06);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; background:var(--bg); font-family:'Inter',sans-serif; overflow:hidden; }

    /* ── App shell ── */
    .app { height:100vh; height:100dvh; display:flex; flex-direction:column; max-width:480px; margin:0 auto; background:var(--surface); overflow:hidden; }

    /* ── Header ── */
    .header { padding:12px 16px 11px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface); }
    .header-top { display:flex; justify-content:space-between; align-items:center; }
    .symbol { font-size:17px; font-weight:700; color:var(--text-primary); letter-spacing:-0.2px; }
    .price-row { display:flex; align-items:baseline; gap:8px; margin-top:2px; }
    .price { font-size:22px; font-weight:700; color:var(--red); letter-spacing:-0.5px; }
    .change { font-size:11px; font-weight:600; color:var(--red-text); background:var(--red-bg); padding:2px 8px; border-radius:20px; }
    .live-badge { display:flex; align-items:center; gap:5px; background:var(--green-bg); padding:5px 11px; border-radius:40px; }
    .live-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 1.4s infinite; }
    .live { font-size:10px; font-weight:700; color:var(--green-text); letter-spacing:0.6px; }
    @keyframes pulse { 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

    /* ── Chart ── */
    .chart-wrapper { flex:1; min-height:0; margin:8px 12px; border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); box-shadow:var(--shadow-xs); }
    #tradingview_chart { width:100%; height:100%; }

    /* ── P&L card ── */
    .pnl-card { margin:0 12px 6px; padding:9px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; transition:all 0.25s ease; box-shadow:var(--shadow-xs); }
    .pnl-card.hidden-for-order { display:none; }
    .pnl-text { font-size:13px; font-weight:600; color:var(--text-secondary); }
    .pnl-amount { font-size:15px; font-weight:700; letter-spacing:-0.2px; }
    .pnl-amount.positive { color:var(--green); }
    .pnl-amount.negative { color:var(--red); }
    .pnl-toggle-btn { background:var(--pill-bg); width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s; flex-shrink:0; }
    .pnl-toggle-btn:active { background:#E4E7EC; }
    .pnl-toggle-btn i { font-size:13px; color:var(--text-secondary); }

    /* ── Bottom section ── */
    .bottom-section { transition:all 0.3s ease; overflow:visible; }
    .bottom-section.collapsed { display:none; }

    /* ── BUY / SELL buttons ── */
    .trade-buttons { padding:0 12px; display:grid; grid-template-columns:1fr 1fr; gap:10px; flex-shrink:0; margin-bottom:8px; }
    .trade-buttons.hidden { display:none; }
    .trade-btn { height:46px; border:none; border-radius:var(--radius-md); font-size:13px; font-weight:700; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; letter-spacing:0.6px; transition:filter .15s,transform .12s,box-shadow .15s; box-shadow:var(--shadow-sm); }
    .trade-btn:active { transform:scale(.97); filter:brightness(.92); box-shadow:none; }
    .buy { background:var(--green); }
    .sell { background:var(--red); }
    .btn-label { font-size:13px; font-weight:700; letter-spacing:0.8px; line-height:1; }
    .trade-btn.quick-flash { animation:quickFlash 0.35s ease; }
    @keyframes quickFlash { 0%{filter:brightness(1.6);transform:scale(1.04)} 100%{filter:brightness(1);transform:scale(1)} }

    /* ── Order block ── */
    .order-block { margin:4px 12px 6px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; flex-shrink:0; display:none; box-shadow:var(--shadow-sm); }
    .order-block.visible { display:block; }
    .order-block-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--bg); border-bottom:1px solid var(--border); }
    .order-block-title { font-size:13px; font-weight:700; color:var(--text-primary); }
    .close-order-block { background:var(--pill-bg); width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s; }
    .close-order-block:active { background:#E4E7EC; }
    .close-order-block i { font-size:11px; color:var(--text-secondary); }
    .order-block-content { padding:10px 12px 12px; }

    /* ── Top row (qty + carry) ── */
    .top-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
    .quantity-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-xl); padding:4px 8px; display:flex; align-items:center; gap:6px; flex:0 0 auto; height:40px; }
    .qty-controls { display:flex; align-items:center; gap:4px; }
    .qty-btn { width:26px; height:26px; border-radius:50%; background:var(--surface); border:1px solid var(--border); font-size:16px; font-weight:600; cursor:pointer; color:var(--text-primary); display:flex; align-items:center; justify-content:center; transition:background .15s; flex-shrink:0; box-shadow:var(--shadow-xs); }
    .qty-btn:active { background:var(--border); }
    .qty-value { width:36px; text-align:center; font-size:13px; font-weight:700; color:var(--text-primary); background:transparent; border:none; font-family:'Inter',sans-serif; }
    .qty-value:focus { outline:none; }
    .unit-toggle { display:flex; gap:2px; background:var(--border); border-radius:40px; padding:3px; flex-shrink:0; }
    .unit-btn { padding:3px 9px; border-radius:32px; font-size:11px; font-weight:600; cursor:pointer; color:var(--pill-text); transition:all .2s; white-space:nowrap; }
    .unit-btn.active { background:var(--surface); color:var(--text-primary); box-shadow:var(--shadow-xs); }
    .carry-box { background:var(--bg); border:1px solid var(--border); padding:3px; border-radius:40px; display:flex; flex:1 1 0; height:40px; min-width:0; }
    .carry-option { flex:1; text-align:center; border-radius:36px; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--text-muted); display:flex; align-items:center; justify-content:center; white-space:nowrap; padding:0 6px; min-width:0; }
    .carry-option.active { background:var(--surface); color:var(--text-primary); box-shadow:var(--shadow-xs); }

    /* ── Bottom row (order type + price) ── */
    .bottom-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; flex-wrap:nowrap; }
    .market-limit-box { background:var(--bg); border:1px solid var(--border); padding:3px; border-radius:40px; display:flex; flex-shrink:0; height:40px; min-width:0; }
    .market-option { min-width:36px; text-align:center; border-radius:36px; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--text-muted); display:flex; align-items:center; justify-content:center; white-space:nowrap; padding:0 8px; }
    .market-option.active { background:var(--surface); color:var(--text-primary); box-shadow:var(--shadow-xs); }
    .limit-price-box { background:var(--bg); border:1px solid var(--border); border-radius:40px; padding:4px 12px; display:none; align-items:center; gap:6px; flex:1; min-width:0; height:40px; }
    .limit-price-box.visible { display:flex; }
    .limit-price-box .price-symbol { font-size:12px; font-weight:600; color:var(--text-muted); flex-shrink:0; }
    .limit-price-box input { flex:1; min-width:0; border:none; background:transparent; font-size:13px; font-weight:700; text-align:right; color:var(--text-primary); font-family:'Inter',sans-serif; width:100%; }
    .limit-price-box input:focus { outline:none; }
    .slm-inline-box { background:var(--bg); border:1px solid var(--border); border-radius:40px; padding:4px 12px; display:none; align-items:center; gap:5px; flex:1; min-width:0; height:40px; }
    .slm-inline-box.visible { display:flex; }
    .slm-inline-box .slm-tag { font-size:9px; font-weight:700; color:var(--text-muted); flex-shrink:0; letter-spacing:.3px; white-space:nowrap; }
    .slm-inline-box input { flex:1; min-width:0; border:none; background:transparent; font-size:13px; font-weight:700; text-align:right; color:var(--text-primary); font-family:'Inter',sans-serif; }
    .slm-inline-box input:focus { outline:none; }

    /* ── GTT row ── */
    .gtt-row { display:none; gap:8px; margin-bottom:8px; align-items:stretch; width:100%; box-sizing:border-box; }
    .gtt-row.visible { display:flex; }
    .gtt-field { background:var(--bg); border:1px solid var(--border); border-radius:40px; padding:4px 10px; display:flex; align-items:center; gap:4px; flex:1 1 0; min-width:0; max-width:calc(50% - 4px); height:40px; overflow:hidden; box-sizing:border-box; }
    .gtt-field .gtt-tag { font-size:9px; font-weight:700; flex-shrink:0; white-space:nowrap; letter-spacing:.3px; }
    .gtt-field.sl-field .gtt-tag { color:var(--red); }
    .gtt-field.tgt-field .gtt-tag { color:var(--green); }
    .gtt-field input { flex:1 1 0; min-width:0; width:0; border:none; background:transparent; font-size:12px; font-weight:700; text-align:right; color:var(--text-primary); font-family:'Inter',sans-serif; overflow:hidden; }
    .gtt-field input:focus { outline:none; }

    /* ── Margin info ── */
    .order-margin-simple { display:flex; justify-content:space-between; align-items:center; padding:8px 2px 4px; gap:16px; font-size:11px; font-weight:500; }
    .margin-line { display:flex; gap:6px; align-items:baseline; }
    .margin-line-label { color:var(--text-muted); font-weight:500; font-size:11px; }
    .margin-line-value { color:var(--text-primary); font-weight:700; font-size:12px; }
    .margin-line-value.negative { color:var(--red); }

    /* ── Submit button ── */
    .submit-btn { width:100%; padding:12px; border:none; border-radius:var(--radius-md); font-size:14px; font-weight:700; color:#fff; cursor:pointer; transition:filter .15s,transform .12s,box-shadow .15s; margin-top:6px; letter-spacing:0.3px; box-shadow:var(--shadow-sm); }
    .submit-btn:active { transform:scale(.98); filter:brightness(.92); box-shadow:none; }
    .submit-buy { background:var(--green); }
    .submit-sell { background:var(--red); }

    /* ── Segment row ── */
    .segment-row { display:flex; align-items:center; justify-content:space-between; padding:4px 12px 7px; gap:8px; flex-shrink:0; }
    .segment-pills { display:flex; gap:5px; flex:1; }
    .segment-pill { display:flex; align-items:center; gap:5px; padding:7px 13px; border-radius:40px; border:none; cursor:pointer; font-size:12px; font-weight:600; background:var(--pill-bg); color:var(--pill-text); font-family:'Inter',sans-serif; transition:all 0.2s ease; }
    .segment-pill i { font-size:13px; transition:color 0.2s ease; }
    .segment-pill.active { background:var(--navy); color:#FFFFFF; box-shadow:var(--shadow-sm); }
    .segment-pill.active i { color:#FFFFFF; }
    .toggle-panel-btn { background:var(--navy); width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:transform 0.15s,opacity 0.2s; box-shadow:var(--shadow-sm); }
    .toggle-panel-btn:active { transform:scale(0.9); opacity:0.85; }
    .toggle-panel-btn i { font-size:14px; color:#FFFFFF; }

    /* ── Info panel ── */
    .info-panel { margin:0 12px 10px; background:var(--bg); border-radius:var(--radius-lg); border:1px solid var(--border); flex-shrink:0; overflow:hidden; max-height:300px; opacity:1; transition:max-height .35s cubic-bezier(.2,.9,.4,1.1),opacity .25s ease,margin .3s ease,border-width .3s ease; display:flex; flex-direction:column; }
    .info-panel.collapsed { max-height:0 !important; opacity:0; margin-top:0; margin-bottom:0; border-width:0; }
    .panel-header { font-size:13px; font-weight:700; color:var(--text-primary); padding:0; background:var(--bg); display:flex; flex-direction:column; gap:0; flex-shrink:0; }
    .panel-header-title { display:none; }
    .order-sub-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); border-top:1px solid var(--border); background:var(--surface); }
    .order-sub-tab { padding:8px 14px; font-size:11px; font-weight:600; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .2s; letter-spacing:.2px; }
    .order-sub-tab.active { color:var(--text-primary); border-bottom:2px solid var(--navy); }
    .panel-content { display:flex; flex-direction:column; gap:6px; padding:8px; overflow-y:auto; max-height:220px; flex:1; min-height:0; }
    .panel-content.chain-mode { gap:0; padding:0; overflow-y:scroll; scrollbar-width:none; display:block !important; }
    .panel-content.chain-mode::-webkit-scrollbar { width:0; }

    /* ── Option chain table ── */
    .chain-table-header {
      display:grid; grid-template-columns:1fr 60px 1fr;
      padding:6px 0 5px; font-size:9px; font-weight:700;
      color:var(--text-muted); letter-spacing:.5px; text-transform:uppercase;
      position:sticky; top:0; background:var(--bg); z-index:1;
      border-bottom:1px solid var(--border);
    }
    .chain-table-header .ch-ce { text-align:left; color:var(--green); padding-left:10px; }
    .chain-table-header .ch-strike { text-align:center; }
    .chain-table-header .ch-pe { text-align:right; color:var(--red); padding-right:10px; }
    .chain-row {
      display:grid; grid-template-columns:1fr 60px 1fr;
      background:var(--surface); border-bottom:1px solid var(--border-soft);
      overflow:hidden; cursor:pointer; flex-shrink:0;
    }
    .chain-row:active .chain-cell-ce,
    .chain-row:active .chain-cell-pe { filter:brightness(.96); }
    .chain-cell-ce, .chain-cell-pe {
      display:flex; flex-direction:column; justify-content:center;
      padding:10px 10px; cursor:pointer;
      transition:background .12s; min-height:52px;
    }
    .chain-cell-ce { border-right:1px solid var(--border-soft); }
    .chain-cell-pe { border-left:1px solid var(--border-soft); align-items:flex-end; }
    .chain-cell-ce:active { background:var(--green-bg); }
    .chain-cell-pe:active { background:var(--red-bg); }
    .chain-cell-strike {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:10px; font-weight:700; color:var(--text-primary); background:var(--bg);
      gap:2px; border-left:1px solid var(--border); border-right:1px solid var(--border);
    }
    .chain-top-row { display:flex; align-items:baseline; gap:5px; }
    .chain-ltp { font-size:12px; font-weight:700; }
    .chain-iv  { font-size:9px; font-weight:500; color:var(--text-muted); }
    .chain-oi  { font-size:8px; font-weight:500; color:#C0C8D8; margin-top:2px; }
    .chain-ce-ltp { color:var(--green); }
    .chain-pe-ltp { color:var(--red); }
    .chain-itm-ce { background:#F0FDF6; }
    .chain-itm-pe { background:#FFF5F5; }
    .chain-atm .chain-cell-strike { background:var(--navy); color:#fff; }
    .chain-cell-ce.selected { background:#D1FAE5; }
    .chain-cell-pe.selected { background:#FEE2E2; }

    /* ── Order & position rows ── */
    .order-row { display:flex; flex-direction:column; gap:8px; background:var(--surface); padding:10px 12px; border-radius:var(--radius-md); font-size:11px; font-weight:500; border:1px solid var(--border); box-shadow:var(--shadow-xs); }
    .order-info-row { display:flex; justify-content:space-between; align-items:center; }
    .order-actions { display:flex; gap:7px; }
    .order-action-btn { flex:1; padding:7px 10px; border-radius:var(--radius-sm); border:none; font-size:11px; font-weight:600; letter-spacing:0.2px; cursor:pointer; text-align:center; transition:transform .12s,filter .12s; font-family:'Inter',sans-serif; }
    .order-action-btn:active { transform:scale(.96); filter:brightness(.93); }
    .modify-order-btn { background:var(--blue-bg); color:var(--blue-text); }
    .delete-order-btn { background:var(--red-bg); color:var(--red-text); }
    .position-row { display:flex; flex-direction:column; gap:8px; background:var(--surface); padding:10px 12px; border-radius:var(--radius-md); font-size:11px; font-weight:500; border:1px solid var(--border); box-shadow:var(--shadow-xs); }
    .position-info-row { display:flex; justify-content:space-between; align-items:center; }
    .position-actions { display:flex; gap:7px; }
    .position-action-btn { flex:1; padding:8px 10px; border-radius:var(--radius-sm); border:none; font-size:11px; font-weight:600; letter-spacing:0.2px; cursor:pointer; text-align:center; transition:transform .12s,filter .12s; font-family:'Inter',sans-serif; }
    .position-action-btn:active { transform:scale(.96); filter:brightness(.93); }
    .add-position-btn { background:var(--green-bg); color:var(--green-text); }
    .exit-position-btn { background:var(--red-bg); color:var(--red-text); }
    .empty-state { text-align:center; color:var(--text-muted); padding:20px; font-size:12px; font-weight:500; }

    /* ── Scrollbar ── */
    .panel-content::-webkit-scrollbar { width:0; }
    .panel-content { scrollbar-width:none; -ms-overflow-style:none; }

    /* ── Panel expanded states ── */
    .app.panel-expanded .pnl-card,.app.panel-expanded .order-block { display:none; }
    .app.panel-expanded .trade-buttons { display:none; }
    .app.panel-expanded .bottom-section { display:flex; flex-direction:column; height:38vh; height:38dvh; flex-shrink:0; min-height:0; }
    /* chain panel uses same height as orders/positions */
    /* chain same height as orders/positions */
    .app.panel-expanded .info-panel { flex:1; min-height:0; max-height:none; display:flex; flex-direction:column; overflow:hidden; border-radius:var(--radius-lg); }
    .app.panel-expanded .panel-header { flex-shrink:0; }
    .app.panel-expanded .panel-content { flex:1; min-height:0; max-height:none !important; overflow-y:scroll; }

    /* ── Toast ── */
    .toast-message { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) scale(.92); background:var(--navy); padding:9px 18px; border-radius:40px; color:#fff; font-weight:600; font-size:12px; z-index:1000; opacity:0; transition:opacity .2s,transform .2s; pointer-events:none; white-space:nowrap; box-shadow:0 4px 12px rgba(16,24,40,.18); }
    .toast-show { opacity:1; transform:translateX(-50%) scale(1); }
    .spacer { height:env(safe-area-inset-bottom,0); flex-shrink:0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="symbol-section">
        <div class="symbol">BANKNIFTY23</div>
        <div class="price-row">
          <span class="price" id="livePriceValue">&#8377;71.00</span>
          <span class="change" id="liveChangePercent">-46.64%</span>
        </div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live">LIVE</span>
      </div>
    </div>
  </div>
  <div class="chart-wrapper"><div id="tradingview_chart"></div></div>
  <div class="pnl-card" id="pnlCard">
    <div><span class="pnl-text">P/L:</span><span class="pnl-amount" id="pnlAmount">+&#8377;0</span></div>
    <div class="pnl-toggle-btn" id="pnlToggleBtn"><i class="ti ti-chevron-up" id="pnlToggleIcon"></i></div>
  </div>
  <div class="bottom-section" id="bottomSection">
    <div class="trade-buttons" id="tradeButtons">
      <button class="trade-btn buy" id="buyButton"><span class="btn-label">BUY</span></button>
      <button class="trade-btn sell" id="sellButton"><span class="btn-label">SELL</span></button>
    </div>
    <div class="order-block" id="orderBlock">
      <div class="order-block-header">
        <span class="order-block-title" id="orderBlockTitle">BANKNIFTY23</span>
        <div class="close-order-block" id="closeOrderBlock"><i class="ti ti-x"></i></div>
      </div>
      <div class="order-block-content">
        <div class="top-row">
          <div class="quantity-box">
            <div class="qty-controls">
              <button class="qty-btn" id="decrementQty">&#8722;</button>
              <input type="number" class="qty-value" id="qtyValue" value="100" step="1">
              <button class="qty-btn" id="incrementQty">+</button>
            </div>
            <div class="unit-toggle" id="unitSwitch">
              <div class="unit-btn active" data-unit="qty">Qty</div>
              <div class="unit-btn" data-unit="lot">Lot</div>
            </div>
          </div>
          <div class="carry-box" id="carryGroup">
            <div class="carry-option" data-carry="intraday">Intraday</div>
            <div class="carry-option" data-carry="carry">Carry</div>
          </div>
        </div>
        <div class="bottom-row">
          <div class="market-limit-box" id="orderTypeGroup">
            <div class="market-option" data-type="market">Mkt</div>
            <div class="market-option" data-type="limit">Lmt</div>
            <div class="market-option" data-type="slm">SLM</div>
            <div class="market-option" data-type="gtt">GTT</div>
            <div class="market-option" data-type="sl" style="display:none;">SL</div>
          </div>
          <div class="limit-price-box" id="limitPriceBox">
            <span class="price-symbol">&#8377;</span>
            <input type="number" id="limitPrice" step="0.05" value="71.00" placeholder="price">
          </div>
          <div class="slm-inline-box" id="slmInlineBox">
            <span class="slm-tag">Trigger &#8377;</span>
            <input type="number" id="triggerPrice" step="0.05" value="71.00" placeholder="trigger">
          </div>
        </div>
        <div class="gtt-row" id="gttRow">
          <div class="gtt-field sl-field"><span class="gtt-tag">SL &#8377;</span><input type="number" id="gttSlPrice" step="0.05" value="70.00" placeholder="stop loss"></div>
          <div class="gtt-field tgt-field"><span class="gtt-tag">Target &#8377;</span><input type="number" id="gttTargetPrice" step="0.05" value="72.00" placeholder="target"></div>
        </div>
        <div class="order-margin-simple" id="orderMarginInfo">
          <div class="margin-line"><span class="margin-line-label">Free Margin:</span><span class="margin-line-value" id="freeMarginOrder">&#8377;50,000</span></div>
          <div class="margin-line"><span class="margin-line-label">Required Margin:</span><span class="margin-line-value" id="requiredMarginOrder">&#8377;0</span></div>
        </div>
        <button class="submit-btn submit-buy" id="submitOrderBtn">BUY 100 Qty</button>
      </div>
    </div>
    <div class="segment-row">
      <div class="segment-pills">
        <button class="segment-pill" data-segment="chain"><i class="ti ti-stack-2"></i>Chain</button>
        <button class="segment-pill active" data-segment="orders"><i class="ti ti-list-check"></i>Orders</button>
        <button class="segment-pill" data-segment="positions"><i class="ti ti-briefcase"></i>Positions</button>
      </div>
      <div class="toggle-panel-btn" id="togglePanelBtn"><i class="ti ti-chevron-down" id="toggleIcon"></i></div>
    </div>
    <div class="info-panel collapsed" id="infoPanel">
      <div class="panel-header" id="panelHeader">
        <div class="panel-header-title">
          <span id="panelHeaderLabel">Orders <i class="ti ti-list-check" style="color:#aaa;font-size:13px;" aria-hidden="true"></i></span>
        </div>

      </div>
      <div class="panel-content" id="panelContent"><div class="empty-state">No orders yet. Tap BUY or SELL.</div></div>
    </div>
  </div>
  <div class="spacer"></div>
</div>
<div id="toastMsg" class="toast-message"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  let currentPrice = 71.00;
  let positionsList = [], ordersList = [], closedOrdersList = [];
  let activeOrderTab = 'open';
  let nextOrderId = 1001, activeSegment = "orders";
  let isPanelExpanded = false, isBottomSectionVisible = true, priceInterval = null;
  let orderType = "market", orderAction = "BUY", orderCarry = "intraday";
  let useLots = false;
  const LOT_SIZE = 25, SCRIPT_NAME = "BANKNIFTY23";
  let freeMarginBalance = 50000;
  const MARGIN_PERCENT = 0.12;

  const livePriceSpan = document.getElementById('livePriceValue');
  const changePercentSpan = document.getElementById('liveChangePercent');
  const pnlAmountSpan = document.getElementById('pnlAmount');
  const pnlCard = document.getElementById('pnlCard');
  const pnlToggleBtn = document.getElementById('pnlToggleBtn');
  const pnlToggleIcon = document.getElementById('pnlToggleIcon');
  const bottomSection = document.getElementById('bottomSection');
  const tradeButtons = document.getElementById('tradeButtons');
  const orderBlock = document.getElementById('orderBlock');
  const orderBlockTitle = document.getElementById('orderBlockTitle');
  const qtyValueInput = document.getElementById('qtyValue');
  const limitPriceBox = document.getElementById('limitPriceBox');
  const limitPriceInput = document.getElementById('limitPrice');
  const submitOrderBtn = document.getElementById('submitOrderBtn');
  const infoPanel = document.getElementById('infoPanel');
  const panelHeader = document.getElementById('panelHeader');
  const panelContent = document.getElementById('panelContent');
  const toggleIcon = document.getElementById('toggleIcon');
  const freeMarginOrderSpan = document.getElementById('freeMarginOrder');
  const requiredMarginOrderSpan = document.getElementById('requiredMarginOrder');
  const appEl = document.querySelector('.app');

  function getDisplayQtyText() { const v = parseInt(qtyValueInput.value)||100; return useLots?`${v} Lot`:`${v} Qty`; }
  function getActualQty() { const v = parseInt(qtyValueInput.value)||100; return useLots?v*LOT_SIZE:v; }
  function getExecutionPrice() {
    if(orderType==='limit') return parseFloat(limitPriceInput.value)||currentPrice;
    if(orderType==='sl'||orderType==='slm') return parseFloat(document.getElementById('triggerPrice').value)||currentPrice;
    return currentPrice;
  }
  function calcMargin(price,qty) { return Math.ceil((price!==undefined?price:getExecutionPrice())*(qty!==undefined?qty:getActualQty())*MARGIN_PERCENT); }
  function updateMarginDisplay() {
    const req = calcMargin();
    requiredMarginOrderSpan.innerText = `\u20b9${req.toLocaleString('en-IN')}`;
    freeMarginOrderSpan.innerText = `\u20b9${freeMarginBalance.toLocaleString('en-IN')}`;
    requiredMarginOrderSpan.classList.toggle('negative', req>freeMarginBalance);
  }
  function updateSubmitBtn() { submitOrderBtn.innerText=`${orderAction} ${getDisplayQtyText()}`; updateMarginDisplay(); }
  function updateAllQuantityDisplays() { updateSubmitBtn(); }
  function toggleBottomSection() {
    isBottomSectionVisible = !isBottomSectionVisible;
    bottomSection.classList.toggle('collapsed', !isBottomSectionVisible);
    pnlToggleIcon.className = isBottomSectionVisible?'ti ti-chevron-up':'ti ti-chevron-down';
  }
  function updatePnL() {
    let total = 0;
    positionsList.forEach(p => { total += p.type==='BUY'?(currentPrice-p.entryPrice)*p.qty:(p.entryPrice-currentPrice)*p.qty; });
    pnlAmountSpan.innerText = `${total>=0?'+':'-'}\u20b9${Math.abs(total).toFixed(0)}`;
    pnlAmountSpan.className = `pnl-amount ${total>=0?'positive':'negative'}`;
  }
  function showToast(msg) {
    const el = document.getElementById('toastMsg');
    el.textContent = msg; el.classList.add('toast-show');
    setTimeout(()=>el.classList.remove('toast-show'), 1800);
  }
  function applyPosition(action, execPrice, qty) {
    if (action==='BUY') {
      const si = positionsList.findIndex(p=>p.type==='SELL');
      if (si!==-1) { const s=positionsList[si]; if(s.qty>=qty){s.qty-=qty;if(!s.qty)positionsList.splice(si,1);}else{const r=qty-s.qty;positionsList.splice(si,1);positionsList.push({type:'BUY',entryPrice:execPrice,qty:r});} }
      else { positionsList.push({type:'BUY',entryPrice:execPrice,qty}); }
    } else {
      const bi = positionsList.findIndex(p=>p.type==='BUY');
      if (bi!==-1) { const b=positionsList[bi]; if(b.qty>=qty){b.qty-=qty;if(!b.qty)positionsList.splice(bi,1);}else{const r=qty-b.qty;positionsList.splice(bi,1);positionsList.push({type:'SELL',entryPrice:execPrice,qty:r});} }
      else { positionsList.push({type:'SELL',entryPrice:execPrice,qty}); }
    }
    positionsList = positionsList.filter(p=>p.qty>0);
  }
  function quickMarketOrder(action) {
    const execPrice=currentPrice, qty=100, required=calcMargin(execPrice,qty);
    if(required>freeMarginBalance){showToast(`Insufficient margin! Need \u20b9${required.toLocaleString('en-IN')}`);return;}
    freeMarginBalance-=required;
    const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const qmRecord={id:nextOrderId++,type:action,price:execPrice,qty,time,orderType:'market',carry:'normal'};
    closedOrdersList.unshift(qmRecord);
    if(closedOrdersList.length>50)closedOrdersList.pop();
    applyPosition(action,execPrice,qty); updatePnL(); updateMarginDisplay(); renderCurrentPanel();
    const btn=action==='BUY'?document.getElementById('buyButton'):document.getElementById('sellButton');
    btn.classList.remove('quick-flash'); void btn.offsetWidth; btn.classList.add('quick-flash');
    btn.addEventListener('animationend',()=>btn.classList.remove('quick-flash'),{once:true});
    showToast(`${action} ${qty} @ \u20b9${execPrice.toFixed(2)} \u2713`);
  }

  let addPositionIndex=-1, exitPositionIndex=-1;
  function showOrderPanel(action, posIndex, isExit) {
    if (posIndex !== undefined) _postOrderSegment = 'positions';
    if(isPanelExpanded){isPanelExpanded=false;infoPanel.classList.add('collapsed');toggleIcon.className='ti ti-chevron-down';appEl.classList.remove('panel-expanded');}
    addPositionIndex = (!isExit&&posIndex!==undefined)?posIndex:-1;
    exitPositionIndex = (isExit&&posIndex!==undefined)?posIndex:-1;
    orderAction = action;
    const isPositionFlow = addPositionIndex>=0||exitPositionIndex>=0;
    const pos = isPositionFlow?positionsList[addPositionIndex>=0?addPositionIndex:exitPositionIndex]:null;
    if(exitPositionIndex>=0) orderBlockTitle.innerText=`Exit \u00b7 ${SCRIPT_NAME}`;
    else if(addPositionIndex>=0) orderBlockTitle.innerText=`Add More \u00b7 ${SCRIPT_NAME}`;
    else orderBlockTitle.innerText=SCRIPT_NAME;
    useLots=false;
    document.querySelectorAll('#unitSwitch .unit-btn').forEach(o=>o.classList.toggle('active',o.dataset.unit==='qty'));
    qtyValueInput.value=(isPositionFlow&&pos)?pos.qty:100;
    const isExitFlow = exitPositionIndex>=0;
    document.querySelector('#orderTypeGroup .market-option[data-type="limit"]').style.display = isExitFlow?'none':'';
    document.querySelector('#orderTypeGroup .market-option[data-type="slm"]').style.display   = isExitFlow?'none':'';
    document.querySelector('#orderTypeGroup .market-option[data-type="gtt"]').style.display   = isExitFlow?'none':(addPositionIndex>=0?'':'none');
    document.querySelector('#orderTypeGroup .market-option[data-type="sl"]').style.display    = isExitFlow?'':'none';
    orderType="market";
    document.querySelectorAll('#orderTypeGroup .market-option').forEach(o=>o.classList.toggle('active',o.dataset.type==='market'));
    limitPriceBox.classList.remove('visible');
    document.getElementById('slmInlineBox').classList.remove('visible');
    document.getElementById('gttRow').classList.remove('visible');
    orderCarry="intraday";
    document.querySelectorAll('#carryGroup .carry-option').forEach(o=>o.classList.toggle('active',o.dataset.carry==='intraday'));
    limitPriceInput.value=currentPrice.toFixed(2);
    document.getElementById('triggerPrice').value=currentPrice.toFixed(2);
    document.getElementById('gttSlPrice').value=(currentPrice*0.99).toFixed(2);
    document.getElementById('gttTargetPrice').value=(currentPrice*1.01).toFixed(2);
    updateAllQuantityDisplays();
    submitOrderBtn.className=`submit-btn ${action==='BUY'?'submit-buy':'submit-sell'}`;
    pnlCard.classList.add('hidden-for-order'); tradeButtons.classList.add('hidden'); orderBlock.classList.add('visible');
  }
  function hideOrderPanel() {
    orderBlock.classList.remove('visible'); tradeButtons.classList.remove('hidden'); pnlCard.classList.remove('hidden-for-order');
    modifyOrderIndex=-1; chainContract=null; updateSubmitBtn();
    // Remove chain-injected elements so they don't show for normal orders
    const bsToggle = document.getElementById('chainBSToggle');
    if (bsToggle) bsToggle.style.display = 'none';
    const detail = document.getElementById('chainContractDetail');
    if (detail) detail.style.display = 'none';
    orderBlockTitle.innerText = SCRIPT_NAME;
  }
  function executeTrade() {
    const execPrice=getExecutionPrice(), qty=getActualQty();
    const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(exitPositionIndex>=0) {
      const pos=positionsList[exitPositionIndex];
      if(pos){
        const exitQty=Math.min(qty,pos.qty);
        const pnl=pos.type==='BUY'?(execPrice-pos.entryPrice)*exitQty:(pos.entryPrice-execPrice)*exitQty;
        freeMarginBalance+=calcMargin(pos.entryPrice,exitQty);
        const exitRecord={id:nextOrderId++,type:orderAction,price:execPrice,qty:exitQty,time,orderType,carry:orderCarry,isExit:true};
        // Exit orders always go to closed (executed immediately)
        closedOrdersList.unshift(exitRecord);
        if(closedOrdersList.length>50)closedOrdersList.pop();
        activeOrderTab='closed';
        pos.qty-=exitQty; if(pos.qty<=0)positionsList.splice(exitPositionIndex,1);
        showToast(`Exited ${exitQty} @ ₹${execPrice.toFixed(2)} | P/L ${pnl>=0?'+':'-'}₹${Math.abs(pnl).toFixed(0)}`);
      }
      exitPositionIndex=-1;
    } else {
      const required=calcMargin(execPrice,qty);
      if(required>freeMarginBalance){showToast(`Insufficient margin! Required: \u20b9${required.toLocaleString('en-IN')}, Available: \u20b9${freeMarginBalance.toLocaleString('en-IN')}`);return;}
      freeMarginBalance-=required;
      const gttSl=orderType==='gtt'?parseFloat(document.getElementById('gttSlPrice').value)||null:null;
      const gttTarget=orderType==='gtt'?parseFloat(document.getElementById('gttTargetPrice').value)||null:null;
      const newOrder={id:nextOrderId++,type:orderAction,price:execPrice,qty,time,orderType,carry:orderCarry,gttSl,gttTarget};
      const isInstant = orderType==='market'; // market executes immediately → closed; others stay open
      if(modifyOrderIndex>=0){
        // Modifying an existing open order: update in place
        const o=ordersList[modifyOrderIndex];
        if(o){o.qty=qty;o.price=execPrice;o.orderType=orderType;o.carry=orderCarry;o.gttSl=gttSl;o.gttTarget=gttTarget;o.time=time;}
        ordersList.shift(); modifyOrderIndex=-1;
        showToast(`Order updated`);
      } else if(addPositionIndex>=0 && isInstant){
        // Adding to position with a market order: executes immediately → closed
        const pos=positionsList[addPositionIndex];
        if(pos){const totalQty=pos.qty+qty;pos.entryPrice=((pos.entryPrice*pos.qty)+(execPrice*qty))/totalQty;pos.qty=totalQty;}
        addPositionIndex=-1;
        closedOrdersList.unshift(newOrder);
        if(closedOrdersList.length>50)closedOrdersList.pop();
        activeOrderTab='closed';
        showToast(`${orderAction} ${qty} @ ₹${execPrice.toFixed(2)} | Margin: ₹${required.toLocaleString('en-IN')}`);
      } else if(addPositionIndex>=0){
        // Adding to position with Limit/SL/SLM/GTT: stays pending → open orders list
        addPositionIndex=-1;
        ordersList.unshift(newOrder);
        if(ordersList.length>50)ordersList.pop();
        activeOrderTab='open';
        showToast(`${orderType.toUpperCase()} order placed @ ₹${execPrice.toFixed(2)}`);
      } else if(isInstant){
        // Market order: execute immediately → position + closed list
        applyPosition(orderAction,execPrice,qty);
        closedOrdersList.unshift(newOrder);
        if(closedOrdersList.length>50)closedOrdersList.pop();
        activeOrderTab='closed';
        showToast(`${orderAction} ${qty} @ ₹${execPrice.toFixed(2)} | Margin: ₹${required.toLocaleString('en-IN')}`);
      } else {
        // Limit / SLM / GTT: pending → open orders list
        ordersList.unshift(newOrder);
        if(ordersList.length>50)ordersList.pop();
        activeOrderTab='open';
        showToast(`${orderType.toUpperCase()} order placed @ ₹${execPrice.toFixed(2)}`);
      }
    }
    // Navigate back to the originating segment
    const returnTo = _postOrderSegment || 'orders';
    _postOrderSegment = null;
    if (returnTo === 'main') {
      // Close panel, stay on main page
      if (isPanelExpanded) {
        isPanelExpanded = false;
        infoPanel.classList.add('collapsed');
        toggleIcon.className = 'ti ti-chevron-down';
        appEl.classList.remove('panel-expanded');
        appEl.classList.remove('segment-chain');
      }
      updatePnL(); hideOrderPanel();
    } else {
      activeSegment = returnTo;
      document.querySelectorAll('.segment-pill').forEach(b => b.classList.toggle('active', b.dataset.segment === returnTo));
      if (!isPanelExpanded) {
        isPanelExpanded = true;
        infoPanel.classList.remove('collapsed');
        toggleIcon.className = 'ti ti-chevron-up';
        appEl.classList.add('panel-expanded');
      }
      appEl.classList.toggle('segment-chain', returnTo === 'chain');
      updatePnL(); updateMarginDisplay(); renderCurrentPanel(); hideOrderPanel();
    }
  }

  let modifyOrderIndex=-1;
  function modifyOrder(i) {
    const o=ordersList[i]; if(!o)return;
    _postOrderSegment = 'orders';
    modifyOrderIndex=i; addPositionIndex=-1; exitPositionIndex=-1;
    if(isPanelExpanded){isPanelExpanded=false;infoPanel.classList.add('collapsed');toggleIcon.className='ti ti-chevron-down';appEl.classList.remove('panel-expanded');}
    orderAction=o.type; orderBlockTitle.innerText=`Modify \u00b7 ${SCRIPT_NAME}`;
    useLots=false;
    document.querySelectorAll('#unitSwitch .unit-btn').forEach(b=>b.classList.toggle('active',b.dataset.unit==='qty'));
    qtyValueInput.value=o.qty;
    const gttPill=document.querySelector('#orderTypeGroup .market-option[data-type="gtt"]');
    const slPill=document.querySelector('#orderTypeGroup .market-option[data-type="sl"]');
    const lmtPill=document.querySelector('#orderTypeGroup .market-option[data-type="limit"]');
    const slmPill=document.querySelector('#orderTypeGroup .market-option[data-type="slm"]');
    if(o.isExit){
      if(gttPill)gttPill.style.display='none';
      if(lmtPill)lmtPill.style.display='none';
      if(slmPill)slmPill.style.display='none';
      if(slPill)slPill.style.display='';
    } else {
      if(gttPill)gttPill.style.display='';
      if(lmtPill)lmtPill.style.display='';
      if(slmPill)slmPill.style.display='';
      if(slPill)slPill.style.display='none';
    }
    orderType=o.orderType||'market';
    document.querySelectorAll('#orderTypeGroup .market-option').forEach(b=>b.classList.toggle('active',b.dataset.type===orderType));
    limitPriceBox.classList.toggle('visible',orderType==='limit'||orderType==='gtt');
    document.getElementById('slmInlineBox').classList.toggle('visible',orderType==='slm'||orderType==='sl');
    document.getElementById('gttRow').classList.toggle('visible',orderType==='gtt'&&!o.isExit);
    orderCarry=o.carry||'intraday';
    document.querySelectorAll('#carryGroup .carry-option').forEach(b=>b.classList.toggle('active',b.dataset.carry===orderCarry));
    limitPriceInput.value=o.price.toFixed(2);
    document.getElementById('triggerPrice').value=o.price.toFixed(2);
    document.getElementById('gttSlPrice').value=(o.gttSl||(o.price*0.99)).toFixed(2);
    document.getElementById('gttTargetPrice').value=(o.gttTarget||(o.price*1.01)).toFixed(2);
    updateAllQuantityDisplays();
    submitOrderBtn.className=`submit-btn ${o.type==='BUY'?'submit-buy':'submit-sell'}`;
    submitOrderBtn.innerText=`Update Order`;
    pnlCard.classList.add('hidden-for-order'); tradeButtons.classList.add('hidden'); orderBlock.classList.add('visible');
  }
  function deleteOrder(i) {
    if(i<0||i>=ordersList.length)return;
    const o=ordersList[i]; ordersList.splice(i,1); showToast(`Order #${o.id} cancelled`);
    renderCurrentPanel();
  }

  function setSegmentHeader(id) {
    const icons={chain:'ti-chart-candle',orders:'ti-list-check',positions:'ti-briefcase'};
    const labels={chain:'Option Chain',orders:'Orders',positions:'Positions'};
    document.getElementById('panelHeaderLabel').innerHTML=`${labels[id]} <i class="ti ${icons[id]}" style="color:#aaa;font-size:13px;" aria-hidden="true"></i>`;

  }
  function setOrderTab(tab) {
    activeOrderTab = tab;
    document.querySelectorAll('.order-sub-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
    renderOrders();
  }
  // ── Strike data generator ─────────────────────────────────
  function getChainStrikes() {
    const atm = Math.round(currentPrice / 100) * 100; // nearest 100
    const strikes = [];
    for (let i = -4; i <= 4; i++) strikes.push(atm + i * 100);
    return strikes.map(strike => {
      const dist = currentPrice - strike;
      // CE price: ITM has intrinsic + time, OTM mostly time value
      const ceIntrinsic = Math.max(0, dist);
      const ceTime = Math.max(0.5, 8 - Math.abs(dist) * 0.05);
      const ceLtp = parseFloat((ceIntrinsic + ceTime + Math.random() * 0.5).toFixed(1));
      const ceIV  = parseFloat((22 + Math.abs(dist) * 0.02 + Math.random()).toFixed(1));
      const ceOI  = Math.round((500 + Math.random() * 200) * (1 - Math.abs(dist)/500));
      // PE price: ITM has intrinsic + time, OTM mostly time value
      const peIntrinsic = Math.max(0, -dist);
      const peTime = Math.max(0.5, 8 - Math.abs(dist) * 0.05);
      const peLtp = parseFloat((peIntrinsic + peTime + Math.random() * 0.5).toFixed(1));
      const peIV  = parseFloat((24 + Math.abs(dist) * 0.02 + Math.random()).toFixed(1));
      const peOI  = Math.round((450 + Math.random() * 200) * (1 - Math.abs(dist)/500));
      const isITM_CE = dist > 0;
      const isITM_PE = dist < 0;
      return { strike, ceLtp, ceIV, ceOI, peLtp, peIV, peOI, isITM_CE, isITM_PE };
    });
  }

  function renderOptionChain() {
    setSegmentHeader('chain');
    panelContent.classList.add('chain-mode');
    const strikes = getChainStrikes();
    const expiry = '23 JAN';
    const atm = Math.round(currentPrice / 100) * 100;
    panelContent.innerHTML = `
      <div class="chain-table-header">
        <span class="ch-ce">CALL</span>
        <span class="ch-strike">Strike</span>
        <span class="ch-pe">PUT</span>
      </div>
      ${strikes.map(r => {
        const isAtm = r.strike === atm;
        return `<div class="chain-row${isAtm ? ' chain-atm' : ''}">
          <div class="chain-cell-ce ${r.isITM_CE ? 'chain-itm-ce' : ''}"
               onclick="openChainOrder('BUY','${r.strike} CE','${expiry}',${r.ceLtp},${r.ceIV})">
            <div class="chain-top-row">
              <span class="chain-ltp chain-ce-ltp">&#8377;${r.ceLtp}</span>
              <span class="chain-iv">${r.ceIV}%</span>
            </div>
            <span class="chain-oi">${r.ceOI}K OI</span>
          </div>
          <div class="chain-cell-strike">
            <span>${r.strike}</span>
            ${isAtm ? '<span style="font-size:7px;color:#1db954;font-weight:700;letter-spacing:.3px;">ATM</span>' : ''}
          </div>
          <div class="chain-cell-pe ${r.isITM_PE ? 'chain-itm-pe' : ''}"
               onclick="openChainOrder('BUY','${r.strike} PE','${expiry}',${r.peLtp},${r.peIV})">
            <div class="chain-top-row" style="justify-content:flex-end;">
              <span class="chain-iv">${r.peIV}%</span>
              <span class="chain-ltp chain-pe-ltp">&#8377;${r.peLtp}</span>
            </div>
            <span class="chain-oi">${r.peOI}K OI</span>
          </div>
        </div>`;
      }).join('')}`;
  }

  // ── Open order panel from chain strike ────────────────────
  // Shows a BUY/SELL chooser overlay then opens the order panel
  function openChainOrder(defaultAction, contractName, expiry, ltp, iv) {
    // Collapse the panel first → go back to page 1
    if (isPanelExpanded) {
      isPanelExpanded = false;
      infoPanel.classList.add('collapsed');
      toggleIcon.className = 'ti ti-chevron-down';
      appEl.classList.remove('panel-expanded');
      appEl.classList.remove('segment-chain');
    }
    // bid = ltp, ask = ltp + small spread (~0.5–1%)
    const bid = ltp;
    const ask = parseFloat((ltp + Math.max(0.05, ltp * 0.005)).toFixed(2));
    chainContract = { name: contractName, expiry, ltp, iv, bid, ask };
    showChainOrderPanel(defaultAction);
  }

  let chainContract = null;
  function showChainOrderPanel(action) {
    _postOrderSegment = 'chain';
    orderAction = action;
    const c = chainContract;
    const fullName = c ? `BANKNIFTY ${c.name} ${c.expiry}` : SCRIPT_NAME;
    orderBlockTitle.innerText = fullName;
    // Show contract detail line
    let detailEl = document.getElementById('chainContractDetail');
    if (!detailEl) {
      detailEl = document.createElement('div');
      detailEl.id = 'chainContractDetail';
      detailEl.style.cssText = 'font-size:10px;color:#8B92A8;font-weight:600;padding:0 12px 6px;display:flex;gap:10px;align-items:center;';
      orderBlock.querySelector('.order-block-content').prepend(detailEl);
    }
    if (c) {
      const isBuy = action === 'BUY';
      const displayPrice = isBuy ? c.ask : c.bid;
      const label = isBuy ? 'Ask' : 'Bid';
      const badgeBg = isBuy ? '#ECFDF3' : '#FEF3F2';
      const badgeColor = isBuy ? '#027A48' : '#B42318';
      detailEl.innerHTML = `
        <span style="background:${badgeBg};color:${badgeColor};padding:2px 8px;border-radius:6px;font-weight:700;font-size:10px;">${label} &#8377;${displayPrice}</span>
        <span style="background:#F2F4F7;color:#667085;padding:2px 8px;border-radius:6px;font-size:10px;">${c.expiry}</span>`;
      detailEl.style.display = 'flex';
      limitPriceInput.value = displayPrice.toFixed(2);
      document.getElementById('triggerPrice').value = displayPrice.toFixed(2);
    } else {
      detailEl.style.display = 'none';
    }

    // Show BUY/SELL toggle inside order block header
    let bsToggle = document.getElementById('chainBSToggle');
    if (!bsToggle) {
      bsToggle = document.createElement('div');
      bsToggle.id = 'chainBSToggle';
      bsToggle.style.cssText = 'display:flex;gap:6px;padding:0 12px 8px;';
      bsToggle.innerHTML = `
        <button onclick="showChainOrderPanel('BUY')" id="chainBuyTab"
          style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:Inter,sans-serif;letter-spacing:0.4px;">BUY</button>
        <button onclick="showChainOrderPanel('SELL')" id="chainSellTab"
          style="flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:Inter,sans-serif;letter-spacing:0.4px;">SELL</button>`;
      orderBlock.querySelector('.order-block-content').prepend(bsToggle);
    }
    bsToggle.style.display = 'flex';
    document.getElementById('chainBuyTab').style.cssText  += `;background:${action==='BUY'?'#12B76A':'#F2F4F7'};color:${action==='BUY'?'#fff':'#667085'};`;
    document.getElementById('chainSellTab').style.cssText += `;background:${action==='SELL'?'#F04438':'#F2F4F7'};color:${action==='SELL'?'#fff':'#667085'};`;

    // Reset order type to market
    orderType = 'market';
    document.querySelectorAll('#orderTypeGroup .market-option').forEach(o => o.classList.toggle('active', o.dataset.type === 'market'));
    // Show limit/gtt options, hide sl (not an entry order)
    document.querySelector('#orderTypeGroup .market-option[data-type="limit"]').style.display = '';
    document.querySelector('#orderTypeGroup .market-option[data-type="slm"]').style.display   = '';
    document.querySelector('#orderTypeGroup .market-option[data-type="gtt"]').style.display   = '';
    document.querySelector('#orderTypeGroup .market-option[data-type="sl"]').style.display    = 'none';
    limitPriceBox.classList.remove('visible');
    document.getElementById('slmInlineBox').classList.remove('visible');
    document.getElementById('gttRow').classList.remove('visible');
    orderCarry = 'intraday';
    document.querySelectorAll('#carryGroup .carry-option').forEach(o => o.classList.toggle('active', o.dataset.carry === 'intraday'));
    useLots = false;
    document.querySelectorAll('#unitSwitch .unit-btn').forEach(o => o.classList.toggle('active', o.dataset.unit === 'qty'));
    qtyValueInput.value = '100';
    updateAllQuantityDisplays();
    submitOrderBtn.className = `submit-btn ${action === 'BUY' ? 'submit-buy' : 'submit-sell'}`;
    pnlCard.classList.add('hidden-for-order');
    tradeButtons.classList.add('hidden');
    orderBlock.classList.add('visible');
  }
  function renderOrders() {
    panelContent.classList.remove('chain-mode');
    setSegmentHeader('orders');
    const list = ordersList;
    if (!list.length) {
      panelContent.innerHTML = `<div class="empty-state">No open orders.</div>`; return;
    }
    panelContent.innerHTML = list.slice(0,20).map((o,i) => {
      const isExit = !!o.isExit;
      const label  = isExit ? 'EXIT' : o.type;
      const isBuy  = o.type === 'BUY';
      const labelBg  = isExit ? '#FFF4EC' : (isBuy ? '#ECFDF3' : '#FEF3F2');
      const labelClr = isExit ? '#C4520A' : (isBuy ? '#027A48' : '#B42318');
      const typeBadge = o.orderType ? `<span style="font-size:9px;background:#EEF4FF;color:#3538CD;padding:1px 6px;border-radius:4px;font-weight:600;">${o.orderType.toUpperCase()}</span>` : '';
      return `<div class="order-row">
        <div class="order-info-row" style="align-items:flex-start;">
          <div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;">
            <span style="font-size:12px;font-weight:700;color:#101828;">${o.name||SCRIPT_NAME}</span>
            <div style="display:flex;align-items:center;gap:5px;">
              <span style="font-weight:700;color:${labelClr};font-size:10px;background:${labelBg};padding:1px 6px;border-radius:4px;">${label}</span>
              <span style="color:#667085;font-size:11px;">${o.qty} qty</span>
              ${typeBadge}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;">
            <span style="font-weight:700;color:#101828;font-size:12px;">&#8377;${o.price.toFixed(2)}</span>
            <span style="font-size:10px;color:#98A2B3;">${o.time}</span>
          </div>
        </div>
        <div class="order-actions">
          <button class="order-action-btn modify-order-btn" onclick="modifyOrder(${i})">Modify</button>
          <button class="order-action-btn delete-order-btn" onclick="deleteOrder(${i})">Delete</button>
        </div>
      </div>`;
    }).join('');
  }
    function renderPositions() {
    panelContent.classList.remove('chain-mode');
    setSegmentHeader('positions');
    if(!positionsList.length){panelContent.innerHTML=`<div class="empty-state">No active positions.</div>`;return;}
    panelContent.innerHTML=positionsList.map((pos,i)=>{
      const pnl=pos.type==='BUY'?(currentPrice-pos.entryPrice)*pos.qty:(pos.entryPrice-currentPrice)*pos.qty;
      return `<div class="position-row">
        <div class="position-info-row">
          <div style="display:flex;flex-direction:column;gap:2px;">
            <span style="font-size:12px;font-weight:700;color:#101828;">${pos.name||SCRIPT_NAME}</span>
            <div style="display:flex;align-items:center;gap:5px;"><span style="font-weight:700;color:${pos.type==='BUY'?'#12B76A':'#F04438'};font-size:10px;background:${pos.type==='BUY'?'#ECFDF3':'#FEF3F2'};padding:1px 6px;border-radius:4px;">${pos.type}</span><span style="color:#667085;font-size:11px;">${pos.qty} qty</span></div>
          </div>
          <div style="color:#667085;font-size:11px;">Entry \u20b9${pos.entryPrice.toFixed(2)}</div>
          <div style="color:${pnl>=0?'#12B76A':'#F04438'};font-weight:700;">${pnl>=0?'+':'-'}\u20b9${Math.abs(pnl).toFixed(0)}</div>
        </div>
        <div class="position-actions">
          <button class="position-action-btn add-position-btn" onclick="addToPosition(${i})">+ Add More</button>
          <button class="position-action-btn exit-position-btn" onclick="exitPosition(${i})">Exit</button>
        </div>
      </div>`;
    }).join('');
  }
  function addToPosition(index){const pos=positionsList[index];if(!pos)return;showOrderPanel(pos.type,index,false);}
  function exitPosition(index){const pos=positionsList[index];if(!pos)return;showOrderPanel(pos.type==='BUY'?'SELL':'BUY',index,true);}
  function renderCurrentPanel(){if(activeSegment==='chain')renderOptionChain();else if(activeSegment==='orders')renderOrders();else renderPositions();}
  function togglePanel(){
    isPanelExpanded=!isPanelExpanded;
    infoPanel.classList.toggle('collapsed',!isPanelExpanded);
    toggleIcon.className=isPanelExpanded?'ti ti-chevron-up':'ti ti-chevron-down';
    appEl.classList.toggle('panel-expanded',isPanelExpanded);
    appEl.classList.toggle('segment-chain',activeSegment==='chain');
    if(isPanelExpanded){if(orderBlock.classList.contains('visible'))hideOrderPanel();renderCurrentPanel();}
  }
  function setActiveSegment(id){
    activeSegment=id;
    document.querySelectorAll('.segment-pill').forEach(b=>b.classList.toggle('active',b.dataset.segment===id));
    appEl.classList.toggle('segment-chain',id==='chain');
    renderCurrentPanel();
  }
  function simulatePriceTick(){
    currentPrice=parseFloat(Math.max(48,Math.min(125,currentPrice*(1+(Math.random()-0.5)*0.025))).toFixed(2));
    livePriceSpan.innerText=`\u20b9${currentPrice.toFixed(2)}`;
    const pct=((currentPrice-71)/71*100).toFixed(2), up=currentPrice>=71;
    changePercentSpan.innerText=`${up?'+':''}${pct}%`;
    changePercentSpan.style.cssText=`color:${up?'#B42318':'#027A48'};background:${up?'#FEF3F2':'#ECFDF3'};padding:2px 8px;border-radius:20px;`;
    livePriceSpan.style.color=up?'#F04438':'#12B76A';
    limitPriceInput.value=currentPrice.toFixed(2);
    updatePnL();
    if(orderBlock.classList.contains('visible'))updateMarginDisplay();
    if(activeSegment==='chain')renderOptionChain();
    else if(activeSegment==='positions'&&isPanelExpanded)renderPositions();
  }

  document.getElementById('incrementQty').addEventListener('click',()=>{let v=parseInt(qtyValueInput.value)||100;v=Math.min(useLots?20:500,v+1);qtyValueInput.value=v;updateAllQuantityDisplays();});
  document.getElementById('decrementQty').addEventListener('click',()=>{let v=parseInt(qtyValueInput.value)||100;v=Math.max(useLots?1:LOT_SIZE,v-1);qtyValueInput.value=v;updateAllQuantityDisplays();});
  qtyValueInput.addEventListener('change',()=>{let v=parseInt(qtyValueInput.value)||100;v=useLots?Math.min(20,Math.max(1,v)):Math.min(500,Math.max(LOT_SIZE,v));qtyValueInput.value=v;updateAllQuantityDisplays();});
  document.querySelectorAll('#unitSwitch .unit-btn').forEach(o=>o.addEventListener('click',()=>{
    document.querySelectorAll('#unitSwitch .unit-btn').forEach(x=>x.classList.remove('active'));
    o.classList.add('active'); useLots=o.dataset.unit==='lot';
    let v=parseInt(qtyValueInput.value)||100;
    qtyValueInput.value=useLots?Math.max(1,Math.floor(v/LOT_SIZE)):v*LOT_SIZE;
    updateAllQuantityDisplays();
  }));
  document.querySelectorAll('#orderTypeGroup .market-option').forEach(o=>o.addEventListener('click',()=>{
    document.querySelectorAll('#orderTypeGroup .market-option').forEach(x=>x.classList.remove('active'));
    o.classList.add('active'); orderType=o.dataset.type;
    const slmBox=document.getElementById('slmInlineBox'), gttRow=document.getElementById('gttRow');
    limitPriceBox.classList.remove('visible'); slmBox.classList.remove('visible'); gttRow.classList.remove('visible');
    if(orderType==='limit')limitPriceBox.classList.add('visible');
    else if(orderType==='slm'||orderType==='sl')slmBox.classList.add('visible');
    else if(orderType==='gtt'){limitPriceBox.classList.add('visible');gttRow.classList.add('visible');}
    updateMarginDisplay();
  }));
  document.querySelectorAll('#carryGroup .carry-option').forEach(o=>o.addEventListener('click',()=>{
    document.querySelectorAll('#carryGroup .carry-option').forEach(x=>x.classList.remove('active'));
    o.classList.add('active'); orderCarry=o.dataset.carry;
  }));
  document.getElementById('buyButton').addEventListener('click',()=>{_postOrderSegment='main';showOrderPanel('BUY');});
  document.getElementById('sellButton').addEventListener('click',()=>{_postOrderSegment='main';showOrderPanel('SELL');});
  document.getElementById('closeOrderBlock').addEventListener('click',hideOrderPanel);
  document.getElementById('submitOrderBtn').addEventListener('click',executeTrade);
  document.querySelectorAll('.segment-pill').forEach(b=>b.addEventListener('click',()=>setActiveSegment(b.dataset.segment)));
  document.getElementById('togglePanelBtn').addEventListener('click',togglePanel);
  pnlToggleBtn.addEventListener('click',toggleBottomSection);

  window.addEventListener('load',()=>{
    if(typeof TradingView!=='undefined'){new TradingView.widget({autosize:true,symbol:"NSE:NIFTY",interval:"5",timezone:"Asia/Kolkata",theme:"light",style:"1",locale:"en",hide_top_toolbar:false,container_id:"tradingview_chart"});}
    orderBlockTitle.innerText=SCRIPT_NAME;
    positionsList=[{type:'BUY',entryPrice:68.50,qty:75,carry:'normal'},{type:'SELL',entryPrice:73.20,qty:50,carry:'normal'}];
    positionsList.forEach(p=>{freeMarginBalance-=calcMargin(p.entryPrice,p.qty);});
    updatePnL(); setActiveSegment('orders'); updateAllQuantityDisplays();
    priceInterval=setInterval(simulatePriceTick,1400);
  });
  window.addEventListener('beforeunload',()=>{if(priceInterval)clearInterval(priceInterval);});
</script>
</body>
</html>
