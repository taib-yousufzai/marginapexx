name: Kite Auto Login (Emergency Backup)

# ── IMPORTANT ────────────────────────────────────────────────────────────────
# The Kite session is now managed automatically by the Ticker Daemon's
# built-in KiteSessionMonitor (scripts/ticker/kiteAutoLogin.ts).
#
# The monitor proactively renews the session 90 minutes before expiry
# and retries on failure — no external scheduler is needed.
#
# This workflow is kept ONLY as a manual emergency fallback for situations
# where the ticker daemon itself cannot renew the session (e.g. it is down).
#
# DO NOT re-add a cron schedule here. GitHub Actions free-tier cron jobs
# are unreliable and have been observed to delay by 4–5 hours, which causes
# the feed to be dead during Indian market hours.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch: # Manual trigger only — use the "Run workflow" button in GitHub Actions UI

jobs:
  autologin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pyotp kiteconnect

      - name: Run Kite auto-login
        env:
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          NEXT_PUBLIC_KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZERODHA_SUPABASE_USER_ID: ${{ secrets.ZERODHA_SUPABASE_USER_ID }}
        run: python scripts/kite_autologin.py
