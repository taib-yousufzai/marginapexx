name: Kite Auto Login

on:
  schedule:
    # 01:01 UTC = 06:31 IST — just after Zerodha invalidates tokens at 06:00 IST
    - cron: '1 1 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  autologin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests pyotp kiteconnect

      - name: Run Kite auto-login
        env:
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          NEXT_PUBLIC_KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZERODHA_SUPABASE_USER_ID: ${{ secrets.ZERODHA_SUPABASE_USER_ID }}
        run: python scripts/kite_autologin.py
